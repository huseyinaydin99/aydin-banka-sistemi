<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Aydın Banka - Giriş Yap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #0f2027, #203a43, #2c5364);
            background-size: cover;
            /* Bankacılık temalı profesyonel bir arka plan resmi */
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1550565118-3a14e8d0386f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
        }

        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: #fff;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-logo {
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            padding: 12px 20px;
            transition: all 0.3s;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            color: #fff;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .btn-primary {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.4s;
            margin-top: 20px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(58, 123, 213, 0.4);
            filter: brightness(1.1);
        }

        .input-group-text {
            background: transparent;
            border: 1px solid var(--glass-border);
            border-right: none;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 12px 0 0 12px;
        }

        .form-control {
            border-radius: 0 12px 12px 0;
        }

        .links {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
        }

        .links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .links a:hover {
            color: #fff;
            text-shadow: 0 0 10px var(--primary-color);
        }

        .alert {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #ff8e9a;
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }

        .remember-me {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .remember-me input {
            margin-right: 8px;
            accent-color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="bg-video"></div>
    
    <div class="container login-container">
        <div class="glass-card">
            <div class="brand-logo">AYDIN BANK</div>
            <h5 class="text-center mb-4" style="font-weight: 300; letter-spacing: 2px;">HOŞ GELDİNİZ</h5>
            
            <div th:if="${param.error}" class="alert alert-danger text-center animate__animated animate__shakeX">
                <i class="fas fa-exclamation-circle me-2"></i> Hatalı kullanıcı adı veya şifre!
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Kullanıcı Adı" required autocomplete="off">
                    </div>
                </div>
                
                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Şifre" required>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3 px-1">
                    <div class="remember-me">
                        <input type="checkbox" id="brand1" name="remember-me">
                        <label for="brand1">Beni Hatırla</label>
                    </div>
                    <a href="#" class="text-decoration-none" style="font-size: 0.8rem; color: rgba(255,255,255,0.6);">Şifremi Unuttum</a>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-2">
                    Giriş Yap <i class="fas fa-sign-in-alt ms-2"></i>
                </button>
            </form>

            <div class="links">
                <span style="color: rgba(255,255,255,0.6);">Henüz hesabınız yok mu?</span><br>
                <a th:href="@{/register}" class="d-inline-block mt-2">
                    <i class="fas fa-user-plus me-1"></i> Hemen Kayıt Olun
                </a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</body>
</html>
