<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Giriş Sayfası</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <script type="application/x-javascript"> addEventListener("load", function() { setTimeout(hideURLbar, 0); }, false); function hideURLbar(){ window.scrollTo(0,1); } </script>
    <link th:href="@{/register/css/popuo-box.css}" rel="stylesheet" type="text/css" media="all" />
    <link rel="stylesheet" th:href="@{/register/css/style.css}" type="text/css" media="all">
    <link href="//fonts.googleapis.com/css?family=Quicksand:300,400,500,700" rel="stylesheet">
</head>
<body>
    <h1>Easy Cash Giriş Formu</h1>
    <div class="w3layoutscontaineragileits">
        <h2>Easy Cash</h2>
        <div th:if="${param.error}" class="alert alert-danger" style="color: red; margin-bottom: 15px;">
            Hatalı kullanıcı adı veya şifre!
        </div>
        <form th:action="@{/login}" method="post">
            <input type="text" name="username" placeholder="Kullanıcı Adınız" required="">
            <input type="password" name="password" placeholder="Şifreniz" required="">
            <br /><br />
            <ul class="agileinfotickwthree">
                <li>
                    <input type="checkbox" id="brand1" name="remember-me">
                    <label for="brand1"><span></span>Beni Hatırla</label>
                    <a th:href="@{/register}">Bir Hesabınız Yok mu?</a>
                </li>
            </ul>
            <div class="aitssendbuttonw3ls">
                <input type="submit" value="Giriş Yap">
                <div class="clear"></div>
            </div>
        </form>
    </div>
    <div class="w3footeragile">
        <p> &copy; 2024 EasyCash Giriş Paneli. Tüm Hakları Saklıdır | Design by <a href="http://w3layouts.com" target="_blank">W3layouts</a></p>
    </div>
    <script type="text/javascript" th:src="@{/register/js/jquery-2.1.4.min.js}"></script>
    <script th:src="@{/register/js/jquery.magnific-popup.js}" type="text/javascript"></script>
    <script>
        $(document).ready(function() {
            $('.w3_play_icon,.w3_play_icon1,.w3_play_icon2').magnificPopup({
                type: 'inline',
                fixedContentPos: false,
                fixedBgPos: true,
                overflowY: 'auto',
                closeBtnInside: true,
                preloader: false,
                midClick: true,
                removalDelay: 300,
                mainClass: 'my-mfp-zoom-in'
            });
        });
    </script>
</body>
</html>
