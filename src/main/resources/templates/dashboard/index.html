<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/customer_layout :: layout(~{::content}, 'Dashboard', ~{::scripts})}">
<body>
<div th:fragment="content">
    <div class="row">
        <div class="animated flipInY col-lg-3 col-md-3 col-sm-6 col-xs-12">
            <div class="tile-stats">
                <div class="icon"><i class="fa fa-dollar"></i></div>
                <div class="count" th:text="${#numbers.formatDecimal(usdToTry, 1, 2)}">0.00</div>
                <h3>Dolar - TL</h3>
                <p>Güncel $ - ₺ Kuru</p>
            </div>
        </div>
        <div class="animated flipInY col-lg-3 col-md-3 col-sm-6 col-xs-12">
            <div class="tile-stats">
                <div class="icon"><i class="fa fa-euro"></i></div>
                <div class="count" th:text="${#numbers.formatDecimal(eurToTry, 1, 2)}">0.00</div>
                <h3>Euro - TL</h3>
                <p>Güncel € - ₺ Kuru</p>
            </div>
        </div>
        <div class="animated flipInY col-lg-3 col-md-3 col-sm-6 col-xs-12">
            <div class="tile-stats">
                <div class="icon"><i class="fa fa-sort-amount-desc"></i></div>
                <div class="count" th:text="${#numbers.formatDecimal(gbpToTry, 1, 2)}">0.00</div>
                <h3>Sterlin - TL</h3>
                <p>Güncel £ - ₺ Kuru</p>
            </div>
        </div>
        <div class="animated flipInY col-lg-3 col-md-3 col-sm-6 col-xs-12">
            <div class="tile-stats">
                <div class="icon"><i class="fa fa-check-square-o"></i></div>
                <div class="count" th:text="${#numbers.formatDecimal(usdToEur, 1, 2)}">0.00</div>
                <h3>Dolar - Euro</h3>
                <p>Güncel $ - € Kuru</p>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8 col-sm-12 col-xs-12">
            <div class="x_panel" style="height: 100%; min-height: 450px;">
                <div class="x_title">
                    <h2 style="font-weight: 600; color: #2A3F54;">Döviz Kurları Oranı <small>USD'e göre</small></h2>
                    <div class="clearfix"></div>
                </div>
                <div class="x_content">
                    <div style="position: relative; height: 350px; width: 100%;">
                        <canvas id="exchangeChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4 col-sm-12 col-xs-12">
            <div class="x_panel" style="height: 100%; min-height: 450px;">
                <div class="x_title">
                    <h2 style="font-weight: 600; color: #2A3F54;">Bildirimler</h2>
                    <div class="clearfix"></div>
                </div>
                <div class="x_content" style="max-height: 380px; overflow-y: auto;">
                    <ul class="list-unstyled msg_list">
                        <li th:each="notification : ${unreadNotifications}" style="border-bottom: 1px solid #f1f1f1; padding: 10px 0;">
                            <a th:if="${notification != null}" style="display: block; width: 100%;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                                    <span th:text="${notification.title}" style="font-weight: 600; color: #2A3F54;">Başlık</span>
                                    <span class="time" th:text="${notification.date != null ? #temporals.format(notification.date, 'HH:mm') : ''}" style="font-size: 11px; color: #999;">Zaman</span>
                                </div>
                                <span class="message" th:text="${notification.content}" style="font-size: 13px; color: #5A738E; display: block; white-space: normal;">İçerik</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:fragment="scripts">
    <script th:src="@{/gentela-gh-pages/vendors/Chart.js/dist/Chart.min.js}"></script>
    <script th:src="@{/js/ChartExchangeRate.js}"></script>
    <script>
        console.log("Dashboard index scripts loaded.");
        if (typeof Chart === 'undefined') {
            console.error("Chart.js is NOT loaded!");
        } else {
            console.log("Chart.js is loaded successfully.");
        }
    </script>
</div>
</body>
</html>
