<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Yeni Kullanıcı Kaydı</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<script type="application/x-javascript"> addEventListener("load", function() { setTimeout(hideURLbar, 0); }, false); function hideURLbar(){ window.scrollTo(0,1); } </script>
	<link th:href="@{/register/css/popuo-box.css}" rel="stylesheet" type="text/css" media="all" />
	<link rel="stylesheet" th:href="@{/register/css/style.css}" type="text/css" media="all">
	<link href="//fonts.googleapis.com/css?family=Quicksand:300,400,500,700" rel="stylesheet">
</head>
<body>
	<h1>Easy Cash Kayıt Formu</h1>
	<div class="w3layoutscontaineragileits">
		<h2>Yeni Müşteri</h2>
		<form th:action="@{/register}" th:object="${appUserRegisterDto}" method="post">
			<input type="text" th:field="*{name}" placeholder="Adınız" required="">
			<input type="text" th:field="*{surname}" placeholder="Soyadınız" required="">
			<input type="text" th:field="*{username}" placeholder="Kullanıcı Adınız" required="">
			<input type="email" th:field="*{email}" placeholder="Mail Adresiniz" required="">
			<input type="password" th:field="*{password}" placeholder="Şifreniz" required="">
			<input type="password" th:field="*{confirmPassword}" placeholder="Şifre Tekrar" required="">
		
            <div style="color:red;" th:if="${error}" th:text="${error}"></div>
			<br /><br />
			<ul class="agileinfotickwthree">
				<li>
					<input type="checkbox" id="brand1" value="" required="">
					<label for="brand1"><span></span>Kullanım Şartlarını Okudum</label>
					<a th:href="@{/login}">Bir Hesabınız Var Mı?</a>
				</li>
			</ul>
			<div class="aitssendbuttonw3ls">
				<input type="submit" value="Kayıt Ol">
				<div class="clear"></div>
			</div>
		</form>
	</div>
	<div class="w3footeragile">
		<p> &copy; 2026 EasyCash Kayıt Paneli. Tüm Hakları Saklıdır | Design by <a href="http://www.github.com/huseyinaydin99" target="_blank">Hüseyin AYDIN</a></p>
	</div>
	<script type="text/javascript" th:src="@{/register/js/jquery-2.1.4.min.js}"></script>
	<script th:src="@{/register/js/jquery.magnific-popup.js}" type="text/javascript"></script>
	<script>
		$(document).ready(function() {
		$('.w3_play_icon,.w3_play_icon1,.w3_play_icon2').magnificPopup({
			type: 'inline',
			fixedContentPos: false,
			fixedBgPos: true,
			overflowY: 'auto',
			closeBtnInside: true,
			preloader: false,
			midClick: true,
			removalDelay: 300,
			mainClass: 'my-mfp-zoom-in'
		});
		});
	</script>
</body>
</html>
