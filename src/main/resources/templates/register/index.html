<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Aydın Banka - Kayıt Ol</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        .bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #0f2027, #203a43, #2c5364);
            background-size: cover;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1563986768609-322da13575f3?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
        }

        .register-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: #fff;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-logo {
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            padding: 10px 18px;
            transition: all 0.3s;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            color: #fff;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .btn-primary {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.4s;
            margin-top: 15px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(58, 123, 213, 0.4);
            filter: brightness(1.1);
        }

        .input-group-text {
            background: transparent;
            border: 1px solid var(--glass-border);
            border-right: none;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 12px 0 0 12px;
        }

        .form-control {
            border-radius: 0 12px 12px 0;
        }

        .links {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
        }

        .links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .links a:hover {
            color: #fff;
            text-shadow: 0 0 10px var(--primary-color);
        }

        .alert {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #ff8e9a;
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }

        .terms {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 10px;
        }

        .terms input {
            margin-right: 8px;
            accent-color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="bg-video"></div>
    
    <div class="container register-container">
        <div class="glass-card">
            <div class="brand-logo">AYDIN BANK</div>
            <h5 class="text-center mb-4" style="font-weight: 300; letter-spacing: 2px;">YENİ HESAP OLUŞTUR</h5>
            
            <form th:action="@{/register}" th:object="${appUserRegisterDto}" method="post">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="Adınız" required>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                            <input type="text" th:field="*{surname}" class="form-control" placeholder="Soyadınız" required>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" th:field="*{username}" class="form-control" placeholder="Kullanıcı Adı" required>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="E-posta Adresiniz" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-key"></i></span>
                            <input type="password" th:field="*{password}" class="form-control" placeholder="Şifre" required>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-check-double"></i></span>
                            <input type="password" th:field="*{confirmPassword}" class="form-control" placeholder="Şifre Tekrar" required>
                        </div>
                    </div>
                </div>

                <div style="color:#ff8e9a; font-size: 0.85rem;" th:if="${error}" th:text="${error}" class="mb-2"></div>

                <div class="terms">
                    <input type="checkbox" id="brand1" value="" required>
                    <label for="brand1">Kullanım Şartlarını ve Gizlilik Politikasını okudum, onaylıyorum.</label>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-3">
                    Kayıt İşlemini Tamamla <i class="fas fa-user-check ms-2"></i>
                </button>
            </form>

            <div class="links">
                <span style="color: rgba(255,255,255,0.6);">Zaten bir hesabınız var mı?</span><br>
                <a th:href="@{/login}" class="d-inline-block mt-2">
                    <i class="fas fa-sign-in-alt me-1"></i> Hemen Giriş Yapın
                </a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</body>
</html>
