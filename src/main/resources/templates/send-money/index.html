<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/customer_layout :: layout(~{::content}, 'Para Transfer Sayfası', ~{::extra_scripts})}">
<body>
<div th:fragment="content">
    <div class="x_title">
        <h2>Easy Cash <small>Havale İşlemleri - Döviz Cinsi: <span th:text="${currency}"></span></small></h2>
        <div class="clearfix"></div>
    </div>
    <div class="x_content">
        <form class="form-horizontal form-label-left" th:action="@{/send-money(currency=${currency})}" th:object="${processDto}" method="post">
            <p>Lütfen havale göndermek istediğiniz kişinin bilgilerini eksiksiz giriniz.</p>
            
            <span class="section">Hesap Bilgileri</span>
            <div class="item form-group">
                <label class="control-label col-md-3 col-sm-3 col-xs-12">Para Transferi Yapmak İstediğiniz Hesabınızı Seçin <span class="required">*</span></label>
                <div class="col-md-6 col-sm-6 col-xs-12">
                    <select th:field="*{senderId}" class="form-control col-md-7 col-xs-12">
                        <option th:each="acc : ${accounts}" th:value="${acc.id}" th:text="${acc.accountNumber + ' - ' + acc.bankBranch + ' - ' + acc.balance + ' ' + acc.currency}"></option>
                    </select>
                </div>
            </div>
            <div class="item form-group">
                <label class="control-label col-md-3 col-sm-3 col-xs-12">Alıcı Hesap Numarası / IBAN <span class="required">*</span></label>
                <div class="col-md-6 col-sm-6 col-xs-12">
                    <input type="text" th:field="*{receiverAccountNumber}" class="form-control col-md-7 col-xs-12" required>
                </div>
            </div>
            <div class="item form-group">
                <label class="control-label col-md-3 col-sm-3 col-xs-12">Miktar <span class="required">*</span></label>
                <div class="col-md-6 col-sm-6 col-xs-12">
                    <input type="number" step="0.01" th:field="*{amount}" class="form-control col-md-7 col-xs-12" required>
                </div>
            </div>
            <div class="item form-group">
                <label class="control-label col-md-3 col-sm-3 col-xs-12">Açıklama</label>
                <div class="col-md-6 col-sm-6 col-xs-12">
                    <textarea rows="5" th:field="*{description}" class="form-control col-md-7 col-xs-12"></textarea>
                </div>
            </div>
            <div class="ln_solid"></div>
            <div class="form-group">
                <div class="col-md-6 col-md-offset-3">
                    <a th:href="@{/dashboard}" class="btn btn-primary">Vazgeç</a>
                    <button type="submit" class="btn btn-success">Para Gönder</button>
                </div>
            </div>
        </form>
    </div>
</div>

<div th:fragment="extra_scripts">
    <!-- SweetAlert Script -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        $(document).ready(function() {
            var successMessage = /*[[${successMessage}]]*/ null;
            
            if (successMessage) {
                // Global handler zaten alert gösteriyor, biz sadece başarılı onaydan sonra yönlendirme yapalım.
                // Global alert'in kapanmasını beklemek için override ediyoruz.
                Swal.fire({
                    title: 'Başarılı!',
                    text: successMessage,
                    icon: 'success',
                    confirmButtonText: 'Tamam'
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = '/my-last-process';
                    }
                });
            }
        });
        /*]]>*/
    </script>
</div>
</body>
</html>
